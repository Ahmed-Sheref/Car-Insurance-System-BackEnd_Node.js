<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Payment</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
</head>
<body>

  <div w3-include-html="include/header.html"></div>

  <div class="card" style="max-width: 680px;">
    <h1>Add Payment</h1>
    <div class="sub">POST → <strong>/api/v1/payment</strong></div>

    <form id="paymentForm">
      <div class="grid">
        <div><label>Policy ID</label><input name="policy_id" placeholder="e.g., 1024" required /></div>
        <div><label>Amount</label><input name="amount" type="number" step="0.01" placeholder="e.g., 4000.00" required /></div>
        <div><label>Payment date</label><input name="payment_date" type="date" required /></div>
        <div><label>Method</label>
          <select name="method" required>
            <option value="">Select…</option>
            <option>Cash</option><option>Card</option><option>Bank Transfer</option>
          </select>
        </div>
        <div style="grid-column:1/-1;">
          <label>Notes (optional)</label>
          <textarea name="notes" placeholder="Reference, partial payment, etc."></textarea>
        </div>
      </div>

      <div class="btns">
        <button type="submit" class="primary">Save payment</button>
        <button type="button" id="prefill" class="ghost">Prefill</button>
        <a href="Policy.html" class="ghost">Back to Policy</a>
      </div>
      <div id="status" class="status"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('paymentForm');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      status.textContent = 'Saving...';
      status.className = 'status';

      const data = Object.fromEntries(new FormData(form));

      const res = await apiFetch('/payment', {
        method: 'POST',
        body: JSON.stringify(data)
      });

      if (!res) return;

      const text = await res.text();
      if (res.ok) {
        status.textContent = `Saved!\n\n${text}`;
        status.className = 'status success';
      } else {
        status.textContent = 'Failed: ' + text;
        status.className = 'status error';
      }
    });

    document.getElementById('prefill').onclick = () => {
      const set = (n, v) => form[n].value = v;
      set('policy_id', '1024');
      set('amount', '4000.00');
      set('payment_date', '2025-01-05');
      form.method.value = 'Card';
      form.notes.value = 'First installment';
      status.textContent = 'Prefilled!';
      status.className = 'status success';
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/w3-include-html@1.0.0/w3-include-html.min.js"></script>
  <script>w3IncludeHTML();</script>
</body>
</html>
