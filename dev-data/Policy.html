<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Policy</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
</head>
<body>

  <div w3-include-html="include/header.html"></div>

  <div class="card">
    <h1>Create Car Insurance Policy</h1>
    <div class="sub">POST → <strong>/api/v1/policy</strong></div>

    <form id="policyForm">
      <div class="grid">
        <div><label>Policy ID</label><input name="policy_id" type="number" required /></div>
        <div><label>Car ID</label><input name="car_id" type="number" required /></div>
        <div><label>Customer ID</label><input name="customer_id" type="number" required /></div>
        <div><label>Coverage type</label>
          <select name="coverage_type" required>
            <option value="">Select…</option>
            <option>Comprehensive</option>
            <option>Third Party</option>
            <option>Collision</option>
          </select>
        </div>
        <div><label>Policy status</label>
          <select name="policy_status" required>
            <option>Active</option><option>Pending</option><option>Cancelled</option>
          </select>
        </div>
        <div><label>Start date</label><input name="start_date" type="date" required /></div>
        <div><label>End date</label><input name="end_date" type="date" required /></div>
        <div><label>Premium (total)</label><input name="premium_total" type="number" step="0.01" required /></div>
        <div><label>Max coverage</label><input name="max_coverage" type="number" step="0.01" required /></div>
        <div><label>Car model</label><input name="car_model" required /></div>
        <div><label>Car year</label><input name="car_year" type="number" min="1970" required /></div>
      </div>

      <fieldset>
        <legend>Optional first payment</legend>
        <div class="row">
          <div><label>Amount</label><input name="first_payment_amount" type="number" step="0.01" /></div>
          <div><label>Payment date</label><input name="first_payment_date" type="date" /></div>
          <div><label>Method</label>
            <select name="first_payment_method">
              <option value="">Select…</option>
              <option>Cash</option><option>Card</option><option>Bank Transfer</option>
            </select>
          </div>
        </div>
      </fieldset>

      <div class="btns">
        <button type="submit" class="primary">Save</button>
        <button type="button" id="prefill" class="ghost">Prefill</button>
        <a href="Policy.html" class="ghost">Back to Policy</a>
      </div>
      <div id="status" class="status"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('policyForm');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      status.textContent = 'Saving...';
      status.className = 'status';

      const data = Object.fromEntries(new FormData(form));

      const res = await apiFetch('/policy', {
        method: 'POST',
        body: JSON.stringify(data)
      });

      if (!res) return;

      const text = await res.text();
      if (res.ok) {
        status.textContent = 'Policy saved!';
        status.className = 'status success';
      } else {
        status.textContent = 'Error: ' + text;
        status.className = 'status error';
      }
    });

    document.getElementById('prefill').onclick = () => {
      const set = (n, v) => form[n] ? form[n].value = v : null;
      set('policy_id', '1024'); set('car_id', '501'); set('customer_id', '301');
      form.coverage_type.value = 'Comprehensive';
      form.policy_status.value = 'Active';
      set('start_date', '2025-01-01'); set('end_date', '2025-12-31');
      set('premium_total', '8000'); set('max_coverage', '80000');
      set('car_model', 'Toyota Corolla'); set('car_year', '2021');
      set('first_payment_amount', '4000'); set('first_payment_date', '2025-01-05');
      form.first_payment_method.value = 'Card';
      status.textContent = 'Prefilled!';
      status.className = 'status success';
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/w3-include-html@1.0.0/w3-include-html.min.js"></script>
  <script>w3IncludeHTML();</script>
</body>
</html>
